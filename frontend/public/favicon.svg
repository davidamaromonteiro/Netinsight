<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gHex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(6,182,212,0.18)"/>
      <stop offset="100%" stop-color="rgba(59,130,246,0.08)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagon shield -->
  <polygon points="50,5 82,5 98,50 82,95 50,95 18,50" fill="url(#gHex)" stroke="url(#gPrimary)" stroke-width="1.8"/>

  <!-- Inner hex -->
  <polygon points="50,12 76,12 90,50 76,88 50,88 24,50" fill="none" stroke="url(#gPrimary)" stroke-width="0.6" opacity="0.2"/>

  <!-- Radar arc -->
  <path d="M 40 50 A 20 20 0 0 1 80 50" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
  <path d="M 34 50 A 26 26 0 0 1 86 50" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.35" stroke-linecap="round" stroke-dasharray="3 3"/>

  <!-- Crosshair -->
  <line x1="60" y1="18" x2="60" y2="82" stroke="#06b6d4" stroke-width="0.7" opacity="0.12"/>
  <line x1="22" y1="50" x2="98" y2="50" stroke="#06b6d4" stroke-width="0.7" opacity="0.12"/>

  <!-- Network nodes -->
  <circle cx="60" cy="22" r="3" fill="#06b6d4" filter="url(#glow)"/>
  <circle cx="38" cy="60" r="2.5" fill="#3b82f6"/>
  <circle cx="82" cy="60" r="2.5" fill="#3b82f6"/>

  <!-- Connections -->
  <line x1="60" y1="22" x2="38" y2="60" stroke="#06b6d4" stroke-width="1.3" opacity="0.5"/>
  <line x1="60" y1="22" x2="82" y2="60" stroke="#06b6d4" stroke-width="1.3" opacity="0.5"/>
  <line x1="38" y1="60" x2="82" y2="60" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>

  <!-- Focal point -->
  <circle cx="60" cy="50" r="10" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.35"/>
  <circle cx="60" cy="50" r="4" fill="url(#gPrimary)" filter="url(#glow)"/>

  <!-- N -->
  <text x="60" y="57" font-family="'Inter', system-ui, sans-serif" font-size="24" font-weight="800" fill="white" text-anchor="middle" filter="url(#glow)">N</text>

  <!-- Vertex dots -->
  <circle cx="50" cy="5" r="2" fill="#06b6d4" opacity="0.6"/>
  <circle cx="82" cy="5" r="2" fill="#06b6d4" opacity="0.6"/>
  <circle cx="98" cy="50" r="2" fill="#3b82f6" opacity="0.6"/>
  <circle cx="82" cy="95" r="2" fill="#3b82f6" opacity="0.6"/>
  <circle cx="50" cy="95" r="2" fill="#3b82f6" opacity="0.6"/>
  <circle cx="18" cy="50" r="2" fill="#06b6d4" opacity="0.6"/>
</svg>
