<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 120">
  <defs>
    <linearGradient id="gradPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gradSecondary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gradHex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(6,182,212,0.12)"/>
      <stop offset="100%" stop-color="rgba(59,130,246,0.05)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ════════════════════ ICON ════════════════════ -->
  <g transform="translate(15, 10)">
    <!-- Outer hexagon shield -->
    <polygon points="50,0 90,0 110,40 90,80 50,80 30,40" fill="url(#gradHex)" stroke="url(#gradPrimary)" stroke-width="1.5" opacity="0.8"/>
    <polygon points="50,3 87,3 106,40 87,77 50,77 33,40" fill="none" stroke="url(#gradSecondary)" stroke-width="0.5" opacity="0.3"/>

    <!-- Hexagon border glow segments (cyber grid feel) -->
    <line x1="50" y1="0" x2="90" y2="0" stroke="#06b6d4" stroke-width="2" opacity="0.3"/>
    <line x1="50" y1="80" x2="90" y2="80" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>

    <!-- Radar scan arc 1 -->
    <path d="M 50 40 A 20 20 0 0 1 90 40" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    
    <!-- Radar scan arc 2 -->
    <path d="M 42 40 A 28 28 0 0 1 98 40" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.35" stroke-linecap="round" stroke-dasharray="4 4"/>
    
    <!-- Crosshair V -->
    <line x1="70" y1="10" x2="70" y2="70" stroke="#06b6d4" stroke-width="0.8" opacity="0.2"/>
    
    <!-- Crosshair H -->
    <line x1="30" y1="40" x2="110" y2="40" stroke="#06b6d4" stroke-width="0.8" opacity="0.2"/>

    <!-- Network node connections -->
    <circle cx="70" cy="15" r="3" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="42" cy="55" r="2.5" fill="#3b82f6"/>
    <circle cx="98" cy="55" r="2.5" fill="#3b82f6"/>
    <circle cx="55" cy="65" r="2" fill="#38bdf8" opacity="0.6"/>
    <circle cx="85" cy="65" r="2" fill="#38bdf8" opacity="0.6"/>

    <!-- Connection lines between nodes -->
    <line x1="70" y1="15" x2="42" y2="55" stroke="#06b6d4" stroke-width="1.2" opacity="0.5"/>
    <line x1="70" y1="15" x2="98" y2="55" stroke="#06b6d4" stroke-width="1.2" opacity="0.5"/>
    <line x1="42" y1="55" x2="98" y2="55" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
    <line x1="55" y1="65" x2="85" y2="65" stroke="#38bdf8" stroke-width="0.8" opacity="0.25"/>
    <line x1="42" y1="55" x2="55" y2="65" stroke="#3b82f6" stroke-width="0.8" opacity="0.25"/>
    <line x1="98" y1="55" x2="85" y2="65" stroke="#3b82f6" stroke-width="0.8" opacity="0.25"/>

    <!-- Center target / eye (insight focal point) -->
    <circle cx="70" cy="40" r="10" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
    <circle cx="70" cy="40" r="4" fill="url(#gradPrimary)" filter="url(#glowStrong)"/>
    
    <!-- Stylized N in center -->
    <text x="70" y="47" font-family="'Inter', 'SF Pro', 'Segoe UI', system-ui, sans-serif" font-size="24" font-weight="800" fill="white" text-anchor="middle" filter="url(#glowStrong)">N</text>

    <!-- Small decorative dots on hexagon vertices -->
    <circle cx="50" cy="0" r="2" fill="#06b6d4" opacity="0.6"/>
    <circle cx="90" cy="0" r="2" fill="#06b6d4" opacity="0.6"/>
    <circle cx="110" cy="40" r="2" fill="#3b82f6" opacity="0.6"/>
    <circle cx="90" cy="80" r="2" fill="#3b82f6" opacity="0.6"/>
    <circle cx="50" cy="80" r="2" fill="#3b82f6" opacity="0.6"/>
    <circle cx="30" cy="40" r="2" fill="#06b6d4" opacity="0.6"/>
  </g>

  <!-- ════════════════════ WORDMARK ════════════════════ -->
  <g transform="translate(145, 0)">
    <!-- NetInsight -->
    <text x="0" y="52" font-family="'Inter', 'SF Pro', 'Segoe UI', system-ui, sans-serif" font-size="38" font-weight="800" fill="white" letter-spacing="-0.5">Net</text>
    <text x="118" y="52" font-family="'Inter', 'SF Pro', 'Segoe UI', system-ui, sans-serif" font-size="38" font-weight="300" fill="#94a3b8" letter-spacing="1">Insight</text>

    <!-- Tagline -->
    <text x="1" y="76" font-family="'SF Mono', 'JetBrains Mono', 'Consolas', monospace" font-size="10" fill="#64748b" letter-spacing="4">ANALYSE DE SÉCURITÉ RÉSEAU</text>

    <!-- Decorative line -->
    <line x1="0" y1="88" x2="280" y2="88" stroke="#1e293b" stroke-width="1"/>

    <!-- Badge version -->
    <rect x="0" y="96" width="48" height="16" rx="3" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="24" y="108" font-family="'SF Mono', 'JetBrains Mono', 'Consolas', monospace" font-size="9" fill="#64748b" text-anchor="middle" font-weight="500">v0.3.0</text>

    <!-- Badge cyber -->
    <rect x="54" y="96" width="82" height="16" rx="3" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.2)" stroke-width="0.5"/>
    <text x="95" y="108" font-family="'SF Mono', 'JetBrains Mono', 'Consolas', monospace" font-size="9" fill="#06b6d4" text-anchor="middle" font-weight="500">⦿ PRODUCTION</text>
  </g>
</svg>
