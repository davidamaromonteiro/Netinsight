<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 100">
  <defs>
    <linearGradient id="gPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gHex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(6,182,212,0.15)"/>
      <stop offset="100%" stop-color="rgba(59,130,246,0.08)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(20, 10)">
    <!-- Outer hexagon shield -->
    <polygon points="50,0 90,0 110,40 90,80 50,80 30,40" fill="url(#gHex)" stroke="url(#gPrimary)" stroke-width="1.5"/>
    
    <!-- Inner hexagon outline -->
    <polygon points="50,4 86,4 104,40 86,76 50,76 36,40" fill="none" stroke="url(#gPrimary)" stroke-width="0.5" opacity="0.25"/>

    <!-- Radar scan arcs -->
    <path d="M 50 40 A 20 20 0 0 1 90 40" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <path d="M 44 40 A 26 26 0 0 1 96 40" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.35" stroke-linecap="round" stroke-dasharray="3 3"/>

    <!-- Crosshair (subtle) -->
    <line x1="70" y1="14" x2="70" y2="66" stroke="#06b6d4" stroke-width="0.6" opacity="0.15"/>
    <line x1="34" y1="40" x2="106" y2="40" stroke="#06b6d4" stroke-width="0.6" opacity="0.15"/>

    <!-- Network nodes -->
    <circle cx="70" cy="15" r="2.5" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="44" cy="52" r="2" fill="#3b82f6"/>
    <circle cx="96" cy="52" r="2" fill="#3b82f6"/>
    <circle cx="56" cy="62" r="1.5" fill="#38bdf8" opacity="0.5"/>
    <circle cx="84" cy="62" r="1.5" fill="#38bdf8" opacity="0.5"/>

    <!-- Node connections -->
    <line x1="70" y1="15" x2="44" y2="52" stroke="#06b6d4" stroke-width="1" opacity="0.45"/>
    <line x1="70" y1="15" x2="96" y2="52" stroke="#06b6d4" stroke-width="1" opacity="0.45"/>
    <line x1="44" y1="52" x2="96" y2="52" stroke="#3b82f6" stroke-width="0.7" opacity="0.25"/>
    <line x1="44" y1="52" x2="56" y2="62" stroke="#3b82f6" stroke-width="0.7" opacity="0.2"/>
    <line x1="96" y1="52" x2="84" y2="62" stroke="#3b82f6" stroke-width="0.7" opacity="0.2"/>

    <!-- Focal point -->
    <circle cx="70" cy="40" r="9" fill="none" stroke="#06b6d4" stroke-width="1.2" opacity="0.35"/>
    <circle cx="70" cy="40" r="3.5" fill="url(#gPrimary)" filter="url(#glowStrong)"/>

    <!-- Stylized N -->
    <text x="70" y="46" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="800" fill="white" text-anchor="middle" filter="url(#glowStrong)">N</text>

    <!-- Vertex dots -->
    <circle cx="50" cy="0" r="1.5" fill="#06b6d4" opacity="0.5"/>
    <circle cx="90" cy="0" r="1.5" fill="#06b6d4" opacity="0.5"/>
    <circle cx="110" cy="40" r="1.5" fill="#3b82f6" opacity="0.5"/>
    <circle cx="90" cy="80" r="1.5" fill="#3b82f6" opacity="0.5"/>
    <circle cx="50" cy="80" r="1.5" fill="#3b82f6" opacity="0.5"/>
    <circle cx="30" cy="40" r="1.5" fill="#06b6d4" opacity="0.5"/>
  </g>

  <!-- Wordmark compact -->
  <g transform="translate(145, 0)">
    <text x="0" y="52" font-family="'Inter', 'SF Pro', 'Segoe UI', system-ui, sans-serif" font-size="34" font-weight="800" fill="white" letter-spacing="-0.5">Net</text>
    <text x="105" y="52" font-family="'Inter', 'SF Pro', 'Segoe UI', system-ui, sans-serif" font-size="34" font-weight="300" fill="#94a3b8" letter-spacing="1">Insight</text>
  </g>
</svg>
