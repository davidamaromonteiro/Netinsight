# NetInsight frontend — Nginx configuration
# =============================================================================
# Development: uses HTTP on port 80 only.
# Production:  uncomment the HTTPS server block and the HTTP→HTTPS redirect below,
#              then mount your TLS certificates at /etc/nginx/certs/.

server {
    listen 80;
    server_name _;

    # ------------------------------------------------------------------
    # Production: redirect HTTP → HTTPS (uncomment when TLS is ready)
    # return 301 https://$host$request_uri;
    # ------------------------------------------------------------------

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: serve index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

